<!--
  Tooltip shell (loaded by tooltip.js via chrome.runtime.getURL).

  Document coordinates (set in JS on #ai-writing-assistant-root):
    left  = scrollX + selection end X
    top   = scrollY + selection end Y
    transform = translateY(-100% - gap)  → sits above the selection end

  In-page layout (this file + styles.css):
    .aiw-tooltip__chrome  — column, align end (menu anchors to bar’s right)
    .aiw-menu             — above .aiw-bar (bottom: 100%)
    .aiw-bar               — primary action + overflow menu trigger

  Dynamic: menu <li> items are injected into [data-aiw="menu"] from the action tree.
-->
<div class="aiw-tooltip__chrome">
  <ul
    id="ai-writing-assistant-menu-list"
    class="aiw-menu"
    role="menu"
    hidden
    data-aiw="menu"
  ></ul>

  <div class="aiw-bar" data-aiw="bar">
    <button
      type="button"
      id="ai-writing-assistant-improve"
      class="aiw-bar__primary"
      data-aiw="main-button"
    >
      <svg class="aiw-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M15 4V2"/><path d="M15 16v-2"/><path d="M8 9h2"/><path d="M20 9h2"/>
        <path d="m17.8 11.8 1.2 1.2"/><path d="m17.8 6.2 1.2-1.2"/><path d="M3 21l9-9"/><path d="M12.2 6.2 11 5"/>
      </svg>
      <span class="aiw-bar__label" data-aiw="main-label">Improve</span>
    </button>

    <span class="aiw-bar__divider" aria-hidden="true"></span>

    <button
      type="button"
      id="ai-writing-assistant-menu"
      class="aiw-bar__trigger"
      data-aiw="menu-button"
      aria-haspopup="true"
      aria-expanded="false"
      aria-label="More actions"
    >
      <svg class="aiw-icon aiw-icon--chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="m6 15 6-6 6 6"/>
      </svg>
    </button>
  </div>
</div>
